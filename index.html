<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopFlow Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="sf-header">
    <div class="sf-header__logo">
        <span class="sf-logo-icon">SF</span>
        <div>
            <h1>ShopFlow Dashboard</h1>
            <p>Loja de equipamentos tecnológicos — Porto</p>
        </div>
    </div>

    <div class="sf-header__info">
        <span id="relogio" class="sf-relogio">--:--:--</span>
        <span id="data-hoje" class="sf-data">--/--/----</span>
    </div>
</header>

<main class="sf-grid">

    <!-- STOCK -->
    <section class="sf-painel sf-painel--stock">
        <div class="sf-painel__cabecalho">
            <h2>Stock</h2>
            <span id="badge-stock" class="sf-badge">0 produtos</span>
        </div>

        <div class="sf-painel__filtros">
            <button class="sf-btn sf-btn--activo" data-categoria="todos">Todos</button>
            <button class="sf-btn" data-categoria="Portáteis">Portáteis</button>
            <button class="sf-btn" data-categoria="Periféricos">Periféricos</button>
            <button class="sf-btn" data-categoria="Monitores">Monitores</button>
            <button class="sf-btn" data-categoria="Acessórios">Acessórios</button>
        </div>

        <div id="lista-produtos" class="sf-lista-produtos">
            <p class="sf-placeholder">A carregar produtos...</p>
        </div>
    </section>

    <!-- VENDAS -->
    <section class="sf-painel">
        <div class="sf-painel__cabecalho">
            <h2>Vendas</h2>
            <span id="indicador-ws" class="sf-indicador sf-indicador--offline">Desligado</span>
        </div>

        <div class="sf-vendas-contador">
            <div class="sf-metrica">
                <span id="total-vendas">0</span>
                <span>Encomendas</span>
            </div>
            <div class="sf-metrica">
                <span id="total-receita">0 €</span>
                <span>Receita</span>
            </div>
        </div>

        <div id="ws-barra" class="sf-ws-barra"></div>

        <div id="feed-vendas" class="sf-feed">
            <p class="sf-placeholder">Aguarda ligação...</p>
        </div>
    </section>

</main>

<script src="app.js"></script>
</body>
</html>
